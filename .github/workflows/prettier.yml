name: Prettier code formatter

on:
  pull_request:
    branches:
      - master
      - main
  push:
    branches:
      - master
      - main

jobs:
  check:
    # available images: https://github.com/actions/runner-images#available-images
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Setup Node.js ⚙️
        uses: actions/setup-node@v5
        with:
          node-version: 24
      - name: Install deps (lockfile) 💾
        run: npm ci
      - name: Determine changed files 📂
        id: changed
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE_SHA="${{ github.event.pull_request.base.sha }}"
            HEAD_SHA="${{ github.event.pull_request.head.sha }}"
          else
            BASE_SHA="${{ github.event.before }}"
            HEAD_SHA="${{ github.sha }}"
          fi

          git diff --name-only "$BASE_SHA" "$HEAD_SHA" \
            | grep -E '\\.(js|jsx|ts|tsx|json|md|yml|yaml|scss|css|liquid)$' \
            > changed-files.txt || true

          COUNT=$(wc -l < changed-files.txt | tr -d ' ')
          echo "count=$COUNT" >> "$GITHUB_OUTPUT"
      - name: Prettier Check 🔎
        id: prettier
        run: |
          if [ "${{ steps.changed.outputs.count }}" = "0" ]; then
            echo "No Prettier-target files changed."
            exit 0
          fi
          xargs -a changed-files.txt npx prettier --check
      - name: Create diff 📝
        # https://docs.github.com/en/actions/learn-github-actions/expressions#failure
        if: ${{ failure() }}
        run: |
          if [ -f changed-files.txt ] && [ -s changed-files.txt ]; then
            xargs -a changed-files.txt npx prettier --write
          fi
          git diff -- . ':(exclude)package-lock.json' ':(exclude)package.json' > diff.txt
          npm install -g diff2html-cli
          diff2html -i file -s side -F diff.html -- diff.txt
      - name: Upload html diff ⬆️
        id: artifact-upload
        if: ${{ failure() && steps.prettier.conclusion == 'failure' }}
        uses: actions/upload-artifact@v5
        with:
          name: HTML Diff
          path: diff.html
          retention-days: 7
      - name: Dispatch information to repository 🗣️
        if: ${{ failure() && steps.prettier.conclusion == 'failure' && github.event_name == 'pull_request' }}
        uses: peter-evans/repository-dispatch@v2
        with:
          event-type: prettier-failed-on-pr
          client-payload: '{"pr_number": "${{ github.event.number }}", "artifact_url": "${{ steps.artifact-upload.outputs.artifact-url }}", "run_id": "${{ github.run_id }}"}'
