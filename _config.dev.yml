# Development-only overrides
# Include post_samples so you can preview demo posts locally.
# Usage: bundle exec jekyll serve --config _config.yml,_config.dev.yml

# Remove post_samples/ from exclusion list
future: true # also publish future-dated posts during local dev
exclude:
  - bin/
  - deckbuilder/
  - post_samples/
  - assets/jupyter/
  - "**/*.ipynb"
  - CONTRIBUTING.md
  - CUSTOMIZE.md
  - Dockerfile
  - docker-compose.yml
  - docker-compose-slim.yml
  - dropdown.md
  - FAQ.md
  - Gemfile
  - Gemfile.lock
  - INSTALL.md
  - LICENSE
  - lighthouse_results/
  - package.json
  - package-lock.json
  - _pages/about_einstein.md
  - purgecss.config.js
  - README.md
  - readme_preview/
  - vendor
  - profiles/unapproved/

# Optionally limit imagemagick during dev for speed (smaller widths)
imagemagick:
  enabled: false
  widths: [480]

# Keep local dev fast by skipping heavyweight converters.
plugins:
  - jekyll-archives-v2
  - jekyll-email-protect
  - jekyll-feed
  - jekyll-get-json
  - jekyll-link-attributes
  - jekyll-minifier
  - jekyll-paginate-v2
  - jekyll-regex-replace
  - jekyll-sitemap
  - jekyll-tabs
  - jekyll-terser
  - jekyll-toc
  - jekyll-twitter-plugin
  - jemoji
